# Do not edit consumer workflow copies directly; update bijux-std and run standards sync refresh.

name: policy / pr approval

on:
  pull_request_target:
    branches: [main]
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - labeled
      - unlabeled
      - ready_for_review
      - converted_to_draft
  pull_request_review:
    types:
      - submitted
      - dismissed

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-approval:
    name: policy / pr approval
    runs-on: ubuntu-latest

    steps:
      - name: Enforce owner approval policy
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_EVENT_PATH: ${{ github.event_path }}
          OWNER_LOGIN: bijux
          OWNER_SELF_SIGNOFF_LABEL: owner-self-signoff
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.request

          repo = os.environ["GH_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          event_name = os.environ["GH_EVENT_NAME"]
          event_path = os.environ["GH_EVENT_PATH"]
          owner_login = os.environ["OWNER_LOGIN"]
          owner_self_signoff_label = os.environ["OWNER_SELF_SIGNOFF_LABEL"]

          with open(event_path, encoding="utf-8") as fh:
            event = json.load(fh)

          pr = event.get("pull_request")
          if not isinstance(pr, dict):
            print("No pull request payload found; skipping.")
            raise SystemExit(0)

          number = pr["number"]
          author = pr["user"]["login"]

          def api_get(path: str):
            request = urllib.request.Request(
              f"https://api.github.com/repos/{repo}{path}",
              headers={
                "Accept": "application/vnd.github+json",
                "Authorization": f"Bearer {token}",
                "X-GitHub-Api-Version": "2022-11-28",
              },
            )
            with urllib.request.urlopen(request) as response:
              return json.load(response)

          pr_fresh = api_get(f"/pulls/{number}")
          labels = {label["name"] for label in pr_fresh.get("labels", [])}

          if author == owner_login:
            if owner_self_signoff_label not in labels:
              print(
                f"Owner-authored PR requires label '{owner_self_signoff_label}'. "
                f"Add the label to confirm explicit self-signoff."
              )
              raise SystemExit(1)
            print(
              f"Owner-authored PR has required self-signoff label: "
              f"{owner_self_signoff_label}"
            )
            raise SystemExit(0)

          reviews = api_get(f"/pulls/{number}/reviews")
          latest_state_by_user: dict[str, str] = {}
          for review in reviews:
            user = review.get("user") or {}
            login = user.get("login")
            state = review.get("state")
            if not login or not state:
              continue
            latest_state_by_user[login] = state

          owner_state = latest_state_by_user.get(owner_login)
          if owner_state != "APPROVED":
            print(
              f"Non-owner PR requires an APPROVED review from '{owner_login}'. "
              f"Current latest state: {owner_state or 'none'}."
            )
            raise SystemExit(1)

          print(f"Non-owner PR has required APPROVED review from {owner_login}.")
          PY
