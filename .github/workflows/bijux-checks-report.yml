name: bijux-checks-report

on:
  push:
    branches: [main]
    paths:
      - ".bijux/checks.consumer.json"
      - ".github/workflows/bijux-checks-report.yml"
      - "shared/bijux-checks/**"
      - "shared/bijux-makes-py/**"
      - "shared/bijux-gh/**"
      - "shared/bijux-docs/**"
      - "makes/**"
      - "Makefile"
  pull_request:
    paths:
      - ".bijux/checks.consumer.json"
      - ".github/workflows/bijux-checks-report.yml"
      - "shared/bijux-checks/**"
      - "shared/bijux-makes-py/**"
      - "shared/bijux-gh/**"
      - "shared/bijux-docs/**"
      - "makes/**"
      - "Makefile"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Run bijux checks suite
        shell: bash
        run: |
          set -euo pipefail
          shared/bijux-checks/scripts/run-bijux-check-suite.sh \
            --consumer .bijux/checks.consumer.json \
            --artifacts-dir artifacts/checks

      - name: Upload bijux checks report artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4.4.0
        with:
          name: bijux-checks-report
          path: artifacts/checks
          if-no-files-found: error
