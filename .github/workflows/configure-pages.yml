name: configure-pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/configure-pages.yml"
      - "CNAME"
  workflow_dispatch:

permissions:
  contents: read
  pages: write

jobs:
  configure:
    name: Enforce Pages configuration
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Configure Pages source and domain
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const cname = "bijux.io";
            const expectedBuildType = "workflow";

            try {
              const { data } = await github.request("GET /repos/{owner}/{repo}/pages", { owner, repo });
              core.info(`Current Pages build type: ${data.build_type}`);
              core.info(`Current Pages custom domain: ${data.cname}`);

              if (data.build_type === expectedBuildType && data.cname === cname) {
                core.info("Pages configuration is already correct.");
                return;
              }
            } catch (error) {
              if (error.status === 403) {
                core.warning("Insufficient token permissions to read Pages configuration. Skipping.");
                return;
              }
              throw error;
            }

            try {
              const { data } = await github.request("PUT /repos/{owner}/{repo}/pages", {
                owner,
                repo,
                build_type: expectedBuildType,
                cname,
              });

              core.info(`Updated Pages build type: ${data.build_type}`);
              core.info(`Updated Pages custom domain: ${data.cname}`);
            } catch (error) {
              if (error.status === 403) {
                core.warning("Insufficient token permissions to update Pages configuration. Skipping.");
                return;
              }
              throw error;
            }
