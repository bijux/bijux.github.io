name: publish-releases

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/publish-releases.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: Publish GitHub releases
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create missing releases from version tags
        uses: actions/github-script@v8
        with:
          script: |
            const { execSync } = require("node:child_process");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tagPattern = /^v(\d+)\.(\d+)\.(\d+)$/;

            const rawTags = execSync("git tag --list 'v*' --sort=v:refname", {
              encoding: "utf8",
            })
              .split("\n")
              .map((tag) => tag.trim())
              .filter(Boolean);

            const tags = rawTags
              .map((tag) => {
                const match = tag.match(tagPattern);
                if (!match) {
                  return null;
                }

                return {
                  tag,
                  version: match.slice(1).map(Number),
                };
              })
              .filter(Boolean);

            if (tags.length === 0) {
              core.info("No version tags found.");
              return;
            }

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            const existingReleaseTags = new Set(releases.map((release) => release.tag_name));
            const missingTags = tags.filter(({ tag }) => !existingReleaseTags.has(tag));

            if (missingTags.length === 0) {
              core.info("All version tags already have releases.");
              return;
            }

            for (const { tag } of missingTags) {
              core.info(`Creating release for ${tag}`);

              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: tag,
                generate_release_notes: true,
              });
            }
