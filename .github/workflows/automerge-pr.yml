name: automerge-pr

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted]
  workflow_run:
    workflows: [bijux-std]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable:
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge when CODEOWNERS approval is present
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            let pullNumber = null;
            if (context.payload.pull_request && context.payload.pull_request.number) {
              pullNumber = context.payload.pull_request.number;
            } else if (context.payload.workflow_run) {
              const workflowRun = context.payload.workflow_run;
              if (workflowRun.event !== "pull_request") {
                core.info("Workflow run is not for pull_request; skipping.");
                return;
              }
              if (workflowRun.conclusion !== "success") {
                core.info("Workflow run did not complete successfully; skipping auto-merge enablement.");
                return;
              }
              const linkedPrs = Array.isArray(workflowRun.pull_requests) ? workflowRun.pull_requests : [];
              if (linkedPrs.length === 0 || !linkedPrs[0].number) {
                core.info("No pull requests linked to workflow run; skipping.");
                return;
              }
              pullNumber = linkedPrs[0].number;
            }

            if (!pullNumber) {
              core.info("No pull request number found in event payload; skipping.");
              return;
            }

            const prResponse = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullNumber,
            });
            const pr = prResponse.data;

            if (pr.state !== "open" || pr.draft) {
              core.info("PR is not eligible for auto-merge enablement.");
              return;
            }

            if (pr.labels.some((label) => label.name === "no-automerge")) {
              core.info("PR has no-automerge label; skipping.");
              return;
            }

            const repoFullName = `${context.repo.owner}/${context.repo.repo}`;
            if (pr.head.repo.full_name !== repoFullName) {
              core.info("PR head is from a fork; skipping auto-merge enablement.");
              return;
            }

            const allowedAssociations = new Set(["OWNER", "MEMBER", "COLLABORATOR"]);
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const latestByReviewer = new Map();
            for (const review of reviews) {
              if (!review.user || !review.user.login) {
                continue;
              }
              const previous = latestByReviewer.get(review.user.login);
              if (!previous) {
                latestByReviewer.set(review.user.login, review);
                continue;
              }
              const previousAt = new Date(previous.submitted_at || 0).getTime();
              const currentAt = new Date(review.submitted_at || 0).getTime();
              if (currentAt >= previousAt) {
                latestByReviewer.set(review.user.login, review);
              }
            }

            const trustedApprovals = Array.from(latestByReviewer.values()).filter((review) =>
              review.state === "APPROVED" &&
              allowedAssociations.has(review.author_association) &&
              review.commit_id === pr.head.sha,
            );

            const codeownersPath = ".github/CODEOWNERS";
            let codeownersContent = "";
            try {
              const codeownersResponse = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: codeownersPath,
                ref: pr.base.ref,
              });
              const payload = codeownersResponse.data;
              if (!("content" in payload) || payload.type !== "file") {
                core.info("CODEOWNERS file is not a plain file; skipping auto-merge enablement.");
                return;
              }
              codeownersContent = Buffer.from(payload.content, "base64").toString("utf8");
            } catch (error) {
              core.info(`Unable to load ${codeownersPath}; skipping auto-merge enablement: ${error.message}`);
              return;
            }

            const codeownerUsers = new Set();
            for (const rawLine of codeownersContent.split(/\r?\n/)) {
              const line = rawLine.trim();
              if (!line || line.startsWith("#")) {
                continue;
              }
              const tokens = line.split(/\s+/).slice(1);
              for (const token of tokens) {
                if (token.startsWith("@") && !token.includes("/")) {
                  codeownerUsers.add(token.slice(1).toLowerCase());
                }
              }
            }

            const hasCodeownerApproval = trustedApprovals.some((review) =>
              review.user && review.user.login && codeownerUsers.has(review.user.login.toLowerCase()),
            );

            const authorLogin = (pr.user && pr.user.login ? pr.user.login : "").toLowerCase();
            const authorIsTrustedCodeowner = Boolean(
              authorLogin &&
              codeownerUsers.has(authorLogin) &&
              allowedAssociations.has(pr.author_association),
            );

            const hasTrustedCodeownerApproval = hasCodeownerApproval || authorIsTrustedCodeowner;
            if (!hasTrustedCodeownerApproval) {
              if (trustedApprovals.length === 0) {
                core.info("No trusted approval present yet; skipping auto-merge enablement.");
              } else {
                core.info("Trusted approvals found, but none from CODEOWNERS users; skipping auto-merge enablement.");
              }
              return;
            }

            if (pr.auto_merge) {
              core.info(`Auto-merge already enabled for #${pr.number}.`);
              return;
            }

            try {
              await github.graphql(
                `mutation EnablePullRequestAutoMerge($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(
                    input: { pullRequestId: $pullRequestId, mergeMethod: MERGE }
                  ) {
                    pullRequest {
                      number
                    }
                  }
                }`,
                { pullRequestId: pr.node_id },
              );
              core.info(`Auto-merge enabled for #${pr.number}.`);
            } catch (error) {
              const message = String(error.message || error);
              if (message.includes("in unstable status")) {
                core.info(`PR #${pr.number} is still unstable; will retry on later events.`);
                return;
              }

              if (message.includes("in clean status")) {
                try {
                  await github.rest.pulls.merge({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: pr.number,
                    merge_method: "merge",
                  });
                  core.info(`PR #${pr.number} merged directly from clean status.`);
                } catch (mergeError) {
                  core.warning(`Direct merge failed for #${pr.number}: ${mergeError.message}`);
                }
                return;
              }

              core.warning(`Auto-merge was not enabled for #${pr.number}: ${message}`);
            }
