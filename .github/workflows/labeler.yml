# Do not edit consumer workflow copies directly; update bijux-std and run standards sync refresh.

name: labeler

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: labeler
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR merge ref for label config
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          persist-credentials: false

      - name: Validate labeler config schema
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import sys

          import yaml

          path = Path(".github/labeler.yml")
          if not path.exists():
              print("ERROR: .github/labeler.yml is missing in checked-out PR merge ref")
              sys.exit(1)

          data = yaml.safe_load(path.read_text(encoding="utf-8"))
          if not isinstance(data, dict):
              print("ERROR: .github/labeler.yml must be a top-level mapping")
              sys.exit(1)

          option_keys = {"changed-files-labels-limit", "max-files-changed"}
          for key, value in data.items():
              if key in option_keys:
                  continue
              if not isinstance(value, list):
                  print(
                      "ERROR: label '%s' must map to a list of rule mappings for actions/labeler v5"
                      % key
                  )
                  sys.exit(1)
              for idx, item in enumerate(value, start=1):
                  if not isinstance(item, dict):
                      print(
                          "ERROR: label '%s' item #%d must be a mapping, got %s"
                          % (key, idx, type(item).__name__)
                      )
                      sys.exit(1)
          PY

      - uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6.0.1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true
          configuration-path: .github/labeler.yml
