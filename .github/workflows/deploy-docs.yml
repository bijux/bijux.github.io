name: deploy-docs

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-docs.yml"
      - "docs/**"
      - "mkdocs.yml"
      - "mkdocs.shared.yml"
      - "requirements-docs.txt"
      - "CNAME"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCS_SITE_URL: https://bijux.io/
  DOCS_SITE_DIR: artifacts/docs/site

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-docs.txt

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install documentation toolchain
        run: python -m pip install -r requirements-docs.txt

      - name: Build documentation site
        env:
          SITE_URL: ${{ env.DOCS_SITE_URL }}
        run: |
          mkdocs build --strict -f mkdocs.yml --site-dir "${DOCS_SITE_DIR}"
          cp CNAME "${DOCS_SITE_DIR}/CNAME"

      - name: Validate published site assets
        shell: bash
        run: |
          set -euo pipefail
          test -f "${DOCS_SITE_DIR}/index.html"
          test -f "${DOCS_SITE_DIR}/CNAME"
          test -f "${DOCS_SITE_DIR}/assets/site-icons/favicon.ico"
          test -f "${DOCS_SITE_DIR}/assets/site-icons/apple-touch-icon.png"
          test -f "${DOCS_SITE_DIR}/assets/site-icons/apple-touch-icon-precomposed.png"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.DOCS_SITE_DIR }}

  deploy:
    name: Deploy docs site
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
