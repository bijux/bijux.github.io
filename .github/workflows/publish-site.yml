name: publish-site

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-site.yml"
      - "CNAME"
      - "Makefile"
      - "docs/**"
      - "internal/quality/**"
      - "internal/scripts/publish_site_root.sh"
      - "makes/**"
      - "mkdocs.shared.yml"
      - "mkdocs.yml"
      - "requirements-docs.txt"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-site-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCS_SITE_URL: https://bijux.io/

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    name: Publish repository root
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-docs.txt

      - name: Install documentation toolchain
        run: python -m pip install -r requirements-docs.txt

      - name: Build documentation site
        env:
          SITE_URL: ${{ env.DOCS_SITE_URL }}
        run: make docs

      - name: Publish built site into the repository root
        run: bash internal/scripts/publish_site_root.sh

      - name: Commit published site
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "$(git status --short)" ]]; then
            echo "Repository root is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "build(site): publish repository root"
          git push
