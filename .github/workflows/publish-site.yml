name: publish-site

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "CNAME"
      - "Makefile"
      - "configs/**"
      - "docs/**"
      - "internal/quality/**"
      - "internal/scripts/sync_bijux_shell.sh"
      - "internal/scripts/verify_shell_source_of_truth.sh"
      - "makes/**"
      - "mkdocs.shared.yml"
      - "mkdocs.yml"
      - "shared/bijux-docs/**"
      - "shared/shared-dir-sha256.txt"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: publish-site-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCS_SITE_URL: https://bijux.io/

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: configs/docs/requirements-docs.txt

      - name: Install documentation toolchain
        run: python -m pip install -r configs/docs/requirements-docs.txt

      - name: Build documentation site
        env:
          SITE_URL: ${{ env.DOCS_SITE_URL }}
        run: make docs

      - name: Validate Pages bundle
        run: |
          test -f artifacts/docs/site/index.html
          test -f artifacts/docs/site/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Verify Pages settings
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const expectedBuildType = "workflow";
            const expectedDomain = "bijux.io";
            try {
              const { data } = await github.request("GET /repos/{owner}/{repo}/pages", { owner, repo });
              const warnings = [];

              if (data.build_type !== expectedBuildType) {
                warnings.push(`Pages build_type expected '${expectedBuildType}', received '${data.build_type}'.`);
              }

              if (data.cname !== expectedDomain) {
                warnings.push(`Pages custom domain expected '${expectedDomain}', received '${data.cname}'.`);
              }

              if (warnings.length) {
                for (const warning of warnings) {
                  core.warning(warning);
                }
              } else {
                core.info("Pages settings match expected values.");
              }
            } catch (error) {
              if (error.status === 403 || error.status === 404) {
                core.warning(`Unable to read Pages settings (${error.status}); skipping validation.`);
                return;
              }
              throw error;
            }

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/docs/site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy pages
        id: deployment
        uses: actions/deploy-pages@v4
