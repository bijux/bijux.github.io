name: publish-site

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-site.yml"
      - "CNAME"
      - "Makefile"
      - "configs/**"
      - "docs/**"
      - "internal/quality/**"
      - "internal/scripts/sync_bijux_shell.sh"
      - "internal/scripts/verify_shell_source_of_truth.sh"
      - "makes/**"
      - "mkdocs.shared.yml"
      - "mkdocs.yml"
      - "shared/bijux-shell/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: publish-site-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCS_SITE_URL: https://bijux.io/

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: configs/docs/requirements-docs.txt

      - name: Install documentation toolchain
        run: python -m pip install -r configs/docs/requirements-docs.txt

      - name: Build documentation site
        env:
          SITE_URL: ${{ env.DOCS_SITE_URL }}
        run: make docs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/docs/site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy pages
        id: deployment
        uses: actions/deploy-pages@v4
