# Do not edit consumer workflow copies directly; update bijux-std and run standards sync refresh.

name: codecov

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  upload:
    name: codecov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.0
        with:
          fetch-depth: 0

      - name: Collect coverage report paths
        id: collect
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(
            find . -type f \
              \( -name "lcov.info" -o -name "coverage.xml" -o -name "*.lcov" \) \
              -not -path "./.git/*" \
              -not -path "./.venv/*" \
              -not -path "./node_modules/*" \
              -not -path "./target/*" \
              | LC_ALL=C sort
          )
          if (( ${#files[@]} == 0 )); then
            echo "found=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          printf 'files=%s\n' "$(IFS=,; echo "${files[*]}")" >> "${GITHUB_OUTPUT}"
          echo "found=true" >> "${GITHUB_OUTPUT}"

      - name: Upload coverage to Codecov
        if: ${{ steps.collect.outputs.found == 'true' }}
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          files: ${{ steps.collect.outputs.files }}
          fail_ci_if_error: false
