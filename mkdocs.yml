INHERIT: mkdocs.shared.yml

site_name: Bijux
site_description: Unified public hub for Bijux systems, documentation, software, and learning programs.
site_author: Bijan Mousavi <bijan@bijux.io>
site_url: !ENV [SITE_URL, https://bijux.io/]
repo_name: bijux/bijux.github.io
repo_url: https://github.com/bijux/bijux.github.io
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: artifacts/docs/site
watch:
  - docs
  - docs/assets
  - docs/overrides
  - mkdocs.yml
  - mkdocs.shared.yml

theme:
  custom_dir: docs/overrides

extra:
  bijux:
    repository: bijux
    hub_links:
      - key: bijux
        label: Bijux
        url: https://bijux.io/
      - key: bijux-core
        label: Core
        url: https://bijux.io/bijux-core/
      - key: bijux-canon
        label: Canon
        url: https://bijux.io/bijux-canon/
      - key: bijux-atlas
        label: Atlas
        url: https://bijux.io/bijux-atlas/
      - key: bijux-proteomics
        label: Proteomics
        url: https://bijux.io/bijux-proteomics/
      - key: bijux-pollenomics
        label: Pollenomics
        url: https://bijux.io/bijux-pollenomics/
      - key: bijux-masterclass
        label: Masterclass
        url: https://bijux.io/bijux-masterclass/

nav:
  - Home: index.md
  - Platform:
      - Overview: platform/index.md
      - Documentation Network: platform/documentation-network.md
      - Public Surface: platform/public-surface.md
  - Projects:
      - Overview: projects/index.md
      - Bijux Core: projects/bijux-core.md
      - Bijux Canon: projects/bijux-canon.md
      - Bijux Atlas: projects/bijux-atlas.md
      - Bijux Proteomics: projects/bijux-proteomics.md
      - Bijux Pollenomics: projects/bijux-pollenomics.md
      - Bijux Masterclass: projects/bijux-masterclass.md
  - Learning:
      - Overview: learning/index.md
      - Reproducible Research: learning/reproducible-research.md
      - Python Programming: learning/python-programming.md
  - Stewardship:
      - Overview: stewardship/index.md
      - Documentation Principles: stewardship/documentation-principles.md
      - Navigation Contract: stewardship/navigation-contract.md
