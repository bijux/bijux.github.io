INHERIT: mkdocs.shared.yml

site_name: Bijux
site_description: Unified public hub for Bijux systems, documentation, software, and learning programs.
site_author: Bijan Mousavi <bijan@bijux.io>
site_url: !ENV [SITE_URL, https://bijux.io/]
repo_name: bijux/bijux.github.io
repo_url: https://github.com/bijux/bijux.github.io
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: artifacts/docs/site
watch:
  - docs
  - docs/assets
  - docs/overrides
  - .bijux/shared/bijux-docs
  - mkdocs.yml
  - mkdocs.shared.yml

theme:
  custom_dir: docs/overrides

extra:
  bijux:
    repository: bijux
    nav_mode: default
    theme_key: bijux:theme
    hub_links:
      - key: bijux
        label: Bijux
        url: https://bijux.io/
      - key: bijux-core
        label: Core
        url: https://bijux.io/bijux-core/
      - key: bijux-canon
        label: Canon
        url: https://bijux.io/bijux-canon/
      - key: bijux-atlas
        label: Atlas
        url: https://bijux.io/bijux-atlas/
      - key: bijux-proteomics
        label: Proteomics
        url: https://bijux.io/bijux-proteomics/
      - key: bijux-pollenomics
        label: Pollenomics
        url: https://bijux.io/bijux-pollenomics/
      - key: bijux-masterclass
        label: Masterclass
        url: https://bijux.io/bijux-masterclass/

nav:
  - Home:
      - Overview: index.md
  - Platform:
      - Overview: 01-platform/index.md
      - Bijux Infrastructure-as-Code: 01-platform/bijux-iac/index.md
      - Bijux Standard Layer: 01-platform/bijux-std/index.md
      - Work Qualities: 01-platform/work-qualities/index.md
      - System Map: 01-platform/system-map/index.md
      - Repository Matrix: 01-platform/repository-matrix/index.md
      - Delivery Surfaces: 01-platform/delivery-surfaces/index.md
      - Applied Domains: 01-platform/applied-domains/index.md
      - Operating Context: 01-platform/operating-context/index.md
      - Documentation Network: 01-platform/documentation-network/index.md
      - Shell Architecture: 01-platform/shell-architecture/index.md
      - Public Surface: 01-platform/public-surface/index.md
  - Projects:
      - Overview: 02-projects/index.md
      - Bijux Core: 02-projects/bijux-core/index.md
      - Bijux Canon: 02-projects/bijux-canon/index.md
      - Bijux Atlas: 02-projects/bijux-atlas/index.md
      - Bijux Proteomics: 02-projects/bijux-proteomics/index.md
      - Bijux Pollenomics: 02-projects/bijux-pollenomics/index.md
  - Learning:
      - Overview: 03-learning/index.md
      - Reproducible Research: 03-learning/reproducible-research/index.md
      - Python Programming: 03-learning/python-programming/index.md
