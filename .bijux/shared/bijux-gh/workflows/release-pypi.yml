# SSOT NOTICE: Synced consumer copies are generated from bijux-std/shared/bijux-gh/workflows/release-pypi.yml.
# Do not edit consumer workflow copies directly; update bijux-std and run standards sync refresh.

name: release-pypi

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to publish (defaults to current tag on tag pushes)"
        required: false
        type: string
      enabled:
        description: "Enable publication for this run"
        required: false
        type: boolean
      mode:
        description: "Publication mode: maturin or artifact"
        required: false
        type: string
      build_matrix_json:
        description: "JSON array for shared release build matrix"
        required: false
        type: string
      package_matrix_json:
        description: "JSON array for artifact mode publication matrix"
        required: false
        type: string
      allow_token_bootstrap_on_missing:
        description: "Allow token bootstrap only when package does not yet exist on PyPI"
        required: false
        type: boolean
  workflow_call:
    inputs:
      release_tag:
        required: false
        type: string
        default: ""
      enabled:
        required: false
        type: boolean
        default: false
      mode:
        required: false
        type: string
        default: ""
      build_matrix_json:
        required: false
        type: string
        default: ""
      package_matrix_json:
        required: false
        type: string
        default: ""
      artifact_suffix:
        required: false
        type: string
        default: ""
      environment_name:
        required: false
        type: string
        default: ""
      publish_auth_default:
        required: false
        type: string
        default: ""
      skip_existing:
        required: false
        type: boolean
        default: true
      allow_token_bootstrap_on_missing:
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  actions: read

concurrency:
  group: release-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    name: resolve-release-pypi-config
    runs-on: ubuntu-24.04
    outputs:
      enabled: ${{ steps.config.outputs.enabled }}
      mode: ${{ steps.config.outputs.mode }}
      release_tag: ${{ steps.config.outputs.release_tag }}
      build_matrix_json: ${{ steps.config.outputs.build_matrix_json }}
      package_matrix_json: ${{ steps.config.outputs.package_matrix_json }}
      allowed_packages: ${{ steps.config.outputs.allowed_packages }}
      artifact_suffix: ${{ steps.config.outputs.artifact_suffix }}
      environment_name: ${{ steps.config.outputs.environment_name }}
      publish_auth_default: ${{ steps.config.outputs.publish_auth_default }}
      skip_existing: ${{ steps.config.outputs.skip_existing }}
      allow_token_bootstrap_on_missing: ${{ steps.config.outputs.allow_token_bootstrap_on_missing }}
      wait_for_ci_command: ${{ steps.config.outputs.wait_for_ci_command }}
      plan_command: ${{ steps.config.outputs.plan_command }}
      prepare_command: ${{ steps.config.outputs.prepare_command }}
      publish_command: ${{ steps.config.outputs.publish_command }}
      setup_python: ${{ steps.config.outputs.setup_python }}
      python_version: ${{ steps.config.outputs.python_version }}
      setup_rust: ${{ steps.config.outputs.setup_rust }}
      rust_toolchain: ${{ steps.config.outputs.rust_toolchain }}
      maturin_version: ${{ steps.config.outputs.maturin_version }}
      cache_dependency_path: ${{ steps.config.outputs.cache_dependency_path }}
      manifest_path: ${{ steps.config.outputs.manifest_path }}
      python_interpreter: ${{ steps.config.outputs.python_interpreter }}
    steps:
      - name: Checkout release configuration
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.0
        with:
          fetch-depth: 1

      - name: Resolve release-pypi configuration
        id: config
        shell: bash
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag || github.event.inputs.release_tag || '' }}
          INPUT_MODE: ${{ inputs.mode || github.event.inputs.mode || '' }}
          INPUT_BUILD_MATRIX_JSON: ${{ inputs.build_matrix_json || github.event.inputs.build_matrix_json || '' }}
          INPUT_PACKAGE_MATRIX_JSON: ${{ inputs.package_matrix_json || github.event.inputs.package_matrix_json || '' }}
          INPUT_ARTIFACT_SUFFIX: ${{ inputs.artifact_suffix || '' }}
          INPUT_ENVIRONMENT_NAME: ${{ inputs.environment_name || '' }}
          INPUT_PUBLISH_AUTH_DEFAULT: ${{ inputs.publish_auth_default || '' }}
          INPUT_ENABLED_RAW: ${{ toJSON(inputs.enabled) }}
          INPUT_SKIP_EXISTING_RAW: ${{ toJSON(inputs.skip_existing) }}
          INPUT_ALLOW_TOKEN_BOOTSTRAP_ON_MISSING_RAW: ${{ toJSON(inputs.allow_token_bootstrap_on_missing) }}
          DISPATCH_ENABLED_RAW: ${{ github.event.inputs.enabled || '' }}
          DISPATCH_SKIP_EXISTING_RAW: ${{ github.event.inputs.skip_existing || '' }}
          DISPATCH_ALLOW_TOKEN_BOOTSTRAP_ON_MISSING_RAW: ${{ github.event.inputs.allow_token_bootstrap_on_missing || '' }}
        run: |
          set -euo pipefail

          if [[ -f ".github/release.env" ]]; then
            # shellcheck disable=SC1091
            source ".github/release.env"
          fi

          non_empty() {
            local value="$1"
            [[ -n "${value// }" ]]
          }

          from_values() {
            local input_value="$1"
            local env_value="$2"
            local repo_var_value="$3"
            local default_value="$4"
            if non_empty "$input_value"; then
              printf '%s\n' "$input_value"
              return
            fi
            if non_empty "$env_value"; then
              printf '%s\n' "$env_value"
              return
            fi
            if non_empty "$repo_var_value"; then
              printf '%s\n' "$repo_var_value"
              return
            fi
            printf '%s\n' "$default_value"
          }

          bool_from_values() {
            local input_value="$1"
            local env_value="$2"
            local repo_var_value="$3"
            local default_value="$4"
            local raw
            raw="$(from_values "$input_value" "$env_value" "$repo_var_value" "$default_value")"
            case "${raw,,}" in
              true|1|yes|on) printf 'true\n' ;;
              false|0|no|off) printf 'false\n' ;;
              *) printf '%s\n' "$default_value" ;;
            esac
          }

          normalize_bool_optional() {
            local raw="$1"
            case "${raw,,}" in
              true|1|yes|on) printf 'true\n' ;;
              false|0|no|off) printf 'false\n' ;;
              ''|null) printf '\n' ;;
              *) printf '\n' ;;
            esac
          }

          filter_matrix() {
            local raw="$1"
            local allowed_raw="$2"
            python3 - "$raw" "$allowed_raw" <<'PY'
          import json
          import re
          import sys

          raw = sys.argv[1]
          allowed_raw = sys.argv[2]
          try:
              value = json.loads(raw)
          except Exception as exc:  # pragma: no cover
              raise SystemExit(f"Invalid matrix JSON: {exc}")
          if not isinstance(value, list):
              raise SystemExit("Matrix JSON must be a JSON array")
          for index, item in enumerate(value):
              if not isinstance(item, dict):
                  raise SystemExit(f"Matrix entry {index} must be an object")
              if "package_slug" not in item or not str(item["package_slug"]).strip():
                  raise SystemExit(f"Matrix entry {index} missing package_slug")

          allowed = {
              part.strip()
              for part in re.split(r"[\s,;]+", allowed_raw.strip())
              if part.strip()
          }
          if allowed:
              value = [item for item in value if str(item.get("package_slug", "")).strip() in allowed]

          print(json.dumps(value, separators=(",", ":")))
          PY
          }

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            default_tag="${GITHUB_REF_NAME}"
          else
            default_tag=""
          fi

          input_enabled="$(normalize_bool_optional "${INPUT_ENABLED_RAW}")"
          if [[ -z "${input_enabled}" ]]; then
            input_enabled="$(normalize_bool_optional "${DISPATCH_ENABLED_RAW}")"
          fi

          input_skip_existing="$(normalize_bool_optional "${INPUT_SKIP_EXISTING_RAW}")"
          if [[ -z "${input_skip_existing}" ]]; then
            input_skip_existing="$(normalize_bool_optional "${DISPATCH_SKIP_EXISTING_RAW}")"
          fi
          input_allow_token_bootstrap_on_missing="$(normalize_bool_optional "${INPUT_ALLOW_TOKEN_BOOTSTRAP_ON_MISSING_RAW}")"
          if [[ -z "${input_allow_token_bootstrap_on_missing}" ]]; then
            input_allow_token_bootstrap_on_missing="$(normalize_bool_optional "${DISPATCH_ALLOW_TOKEN_BOOTSTRAP_ON_MISSING_RAW}")"
          fi

          release_tag="$(from_values "${INPUT_RELEASE_TAG}" "${BIJUX_PYPI_RELEASE_TAG:-}" "${{ vars.BIJUX_PYPI_RELEASE_TAG || '' }}" "$default_tag")"
          enabled="$(bool_from_values "${input_enabled}" "${BIJUX_PYPI_ENABLED:-}" "${{ vars.BIJUX_PYPI_ENABLED || '' }}" "false")"
          mode="$(from_values "${INPUT_MODE}" "${BIJUX_PYPI_MODE:-}" "${{ vars.BIJUX_PYPI_MODE || '' }}" "maturin")"
          build_matrix_json="$(from_values "${INPUT_BUILD_MATRIX_JSON}" "${BIJUX_RELEASE_BUILD_MATRIX_JSON:-}" "${{ vars.BIJUX_RELEASE_BUILD_MATRIX_JSON || '' }}" "[]")"
          package_matrix_json="$(from_values "${INPUT_PACKAGE_MATRIX_JSON}" "${BIJUX_PYPI_PACKAGE_MATRIX_JSON:-}" "${{ vars.BIJUX_PYPI_PACKAGE_MATRIX_JSON || '' }}" "[]")"
          allowed_packages="$(from_values "" "${BIJUX_PYPI_ALLOWED_PACKAGES:-}" "${{ vars.BIJUX_PYPI_ALLOWED_PACKAGES || '' }}" "")"
          artifact_suffix="$(from_values "${INPUT_ARTIFACT_SUFFIX}" "${BIJUX_PYPI_ARTIFACT_SUFFIX:-}" "${{ vars.BIJUX_PYPI_ARTIFACT_SUFFIX || '' }}" "-pypi-dist")"
          environment_name="$(from_values "${INPUT_ENVIRONMENT_NAME}" "${BIJUX_PYPI_ENVIRONMENT_NAME:-}" "${{ vars.BIJUX_PYPI_ENVIRONMENT_NAME || '' }}" "pypi")"
          publish_auth_default="$(from_values "${INPUT_PUBLISH_AUTH_DEFAULT}" "${BIJUX_PYPI_PUBLISH_AUTH_DEFAULT:-}" "${{ vars.BIJUX_PYPI_PUBLISH_AUTH_DEFAULT || '' }}" "trusted")"
          skip_existing="$(bool_from_values "${input_skip_existing}" "${BIJUX_PYPI_SKIP_EXISTING:-}" "${{ vars.BIJUX_PYPI_SKIP_EXISTING || '' }}" "true")"
          allow_token_bootstrap_on_missing="$(bool_from_values "${input_allow_token_bootstrap_on_missing}" "${BIJUX_PYPI_ALLOW_TOKEN_BOOTSTRAP_ON_MISSING:-}" "${{ vars.BIJUX_PYPI_ALLOW_TOKEN_BOOTSTRAP_ON_MISSING || '' }}" "true")"

          if [[ "${enabled}" == "true" && -n "${release_tag}" && "${release_tag}" != v* ]]; then
            echo "release_tag must start with 'v' when release-pypi is enabled: ${release_tag}" >&2
            exit 1
          fi

          wait_for_ci_command="$(from_values "" "${BIJUX_PYPI_WAIT_FOR_CI_COMMAND:-}" "${{ vars.BIJUX_PYPI_WAIT_FOR_CI_COMMAND || '' }}" "")"
          plan_command="$(from_values "" "${BIJUX_PYPI_PLAN_COMMAND:-}" "${{ vars.BIJUX_PYPI_PLAN_COMMAND || '' }}" "")"
          prepare_command="$(from_values "" "${BIJUX_PYPI_PREPARE_COMMAND:-}" "${{ vars.BIJUX_PYPI_PREPARE_COMMAND || '' }}" "")"
          publish_command="$(from_values "" "${BIJUX_PYPI_PUBLISH_COMMAND:-}" "${{ vars.BIJUX_PYPI_PUBLISH_COMMAND || '' }}" "make publish-py PUBLISH_BUILD=0")"
          setup_python="$(bool_from_values "" "${BIJUX_PYPI_SETUP_PYTHON:-}" "${{ vars.BIJUX_PYPI_SETUP_PYTHON || '' }}" "true")"
          python_version="$(from_values "" "${BIJUX_PYPI_PYTHON_VERSION:-}" "${{ vars.BIJUX_PYPI_PYTHON_VERSION || '' }}" "3.11")"
          setup_rust="$(bool_from_values "" "${BIJUX_PYPI_SETUP_RUST:-}" "${{ vars.BIJUX_PYPI_SETUP_RUST || '' }}" "true")"
          rust_toolchain="$(from_values "" "${BIJUX_PYPI_RUST_TOOLCHAIN:-}" "${{ vars.BIJUX_PYPI_RUST_TOOLCHAIN || '' }}" "1.85.0")"
          maturin_version="$(from_values "" "${BIJUX_PYPI_MATURIN_VERSION:-}" "${{ vars.BIJUX_PYPI_MATURIN_VERSION || '' }}" "v1.12.6")"
          cache_dependency_path="$(from_values "" "${BIJUX_PYPI_CACHE_DEPENDENCY_PATH:-}" "${{ vars.BIJUX_PYPI_CACHE_DEPENDENCY_PATH || '' }}" "crates/bijux-cli-python/pyproject.toml")"
          manifest_path="$(from_values "" "${BIJUX_PYPI_MANIFEST_PATH:-}" "${{ vars.BIJUX_PYPI_MANIFEST_PATH || '' }}" "crates/bijux-cli-python/Cargo.toml")"
          python_interpreter="$(from_values "" "${BIJUX_PYPI_INTERPRETER:-}" "${{ vars.BIJUX_PYPI_INTERPRETER || '' }}" "python3.11")"

          if [[ "${mode}" != "maturin" && "${mode}" != "artifact" ]]; then
            echo "Unsupported BIJUX_PYPI_MODE: ${mode}" >&2
            exit 1
          fi

          build_matrix_json="$(filter_matrix "${build_matrix_json}" "${allowed_packages}")"
          package_matrix_json="$(filter_matrix "${package_matrix_json}" "${allowed_packages}")"

          if [[ "${mode}" == "artifact" && ( "${build_matrix_json}" == "[]" || "${package_matrix_json}" == "[]" ) ]]; then
            enabled="false"
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${enabled}" != "true" ]]; then
            echo "Manual dispatch resolved to a no-op release-pypi run." >&2
            echo "Set enabled=true and ensure release matrices resolve to at least one package." >&2
            exit 1
          fi

          {
            echo "release_tag=${release_tag}"
            echo "enabled=${enabled}"
            echo "mode=${mode}"
            echo "allowed_packages=${allowed_packages}"
            echo "artifact_suffix=${artifact_suffix}"
            echo "environment_name=${environment_name}"
            echo "publish_auth_default=${publish_auth_default}"
            echo "skip_existing=${skip_existing}"
            echo "allow_token_bootstrap_on_missing=${allow_token_bootstrap_on_missing}"
            echo "wait_for_ci_command=${wait_for_ci_command}"
            echo "plan_command=${plan_command}"
            echo "prepare_command=${prepare_command}"
            echo "publish_command=${publish_command}"
            echo "setup_python=${setup_python}"
            echo "python_version=${python_version}"
            echo "setup_rust=${setup_rust}"
            echo "rust_toolchain=${rust_toolchain}"
            echo "maturin_version=${maturin_version}"
            echo "cache_dependency_path=${cache_dependency_path}"
            echo "manifest_path=${manifest_path}"
            echo "python_interpreter=${python_interpreter}"
            echo "build_matrix_json<<EOF"
            printf '%s\n' "${build_matrix_json}"
            echo "EOF"
            echo "package_matrix_json<<EOF"
            printf '%s\n' "${package_matrix_json}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    name: build-${{ matrix.package_slug }}
    needs: resolve
    if: ${{ needs.resolve.outputs.enabled == 'true' && needs.resolve.outputs.mode == 'artifact' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.resolve.outputs.build_matrix_json) }}
    uses: ./.github/workflows/release-artifacts.yml
    with:
      package_slug: ${{ matrix.package_slug }}
      package_dir: ${{ matrix.package_dir }}
      artifacts_dir: ${{ matrix.artifacts_dir }}
      makefile_path: ${{ matrix.makefile_path || '' }}
      build_targets: ${{ matrix.build_targets || 'build' }}
      dist_subdir: ${{ matrix.dist_subdir || 'build' }}
  publish_artifact:
    name: publish-pypi-${{ matrix.package_slug }}
    needs:
      - resolve
      - build
    if: ${{ needs.resolve.outputs.enabled == 'true' && needs.resolve.outputs.mode == 'artifact' }}
    runs-on: ubuntu-24.04
    environment:
      name: ${{ matrix.environment_name || needs.resolve.outputs.environment_name }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.resolve.outputs.package_matrix_json) }}

    steps:
      - name: Resolve publish auth mode
        id: auth
        shell: bash
        run: |
          set -euo pipefail
          mode='${{ matrix.publish_auth }}'
          if [[ -z "${mode}" ]]; then
            mode='${{ needs.resolve.outputs.publish_auth_default }}'
          fi
          case "${mode}" in
            trusted|token) ;;
            *)
              echo "Unsupported publish auth mode: ${mode}" >&2
              echo "Expected one of: trusted, token" >&2
              exit 1
              ;;
          esac
          echo "mode=${mode}" >> "$GITHUB_OUTPUT"

      - name: Download publish artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ matrix.artifact_name || format('{0}{1}', matrix.package_slug, needs.resolve.outputs.artifact_suffix) }}
          path: .github/tmp/${{ matrix.package_slug }}-dist

      - name: Probe package presence on PyPI
        id: pypi_project
        shell: bash
        run: |
          set -euo pipefail
          package_name='${{ matrix.package_name || '' }}'
          if [[ -z "${package_name}" ]]; then
            dist_path="$(find .github/tmp/${{ matrix.package_slug }}-dist -maxdepth 1 -type f \( -name '*.whl' -o -name '*.tar.gz' \) | sort | head -n 1)"
            if [[ -n "${dist_path}" ]]; then
              file_name="$(basename "${dist_path}")"
              package_name="${file_name%%-*}"
              package_name="${package_name//_/-}"
            fi
          fi
          if [[ -z "${package_name}" ]]; then
            package_name='${{ matrix.package_slug }}'
          fi
          status_code="$(curl --silent --show-error --location --retry 2 --retry-delay 1 --output /dev/null --write-out '%{http_code}' "https://pypi.org/pypi/${package_name}/json" || true)"
          case "${status_code}" in
            200)
              echo "exists=true" >> "$GITHUB_OUTPUT"
              echo "probe_status=exists" >> "$GITHUB_OUTPUT"
              ;;
            404)
              echo "exists=false" >> "$GITHUB_OUTPUT"
              echo "probe_status=missing" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "exists=unknown" >> "$GITHUB_OUTPUT"
              echo "probe_status=error" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Publish to PyPI (trusted publisher)
        id: trusted_publish
        if: ${{ steps.auth.outputs.mode != 'token' }}
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: .github/tmp/${{ matrix.package_slug }}-dist
          skip-existing: ${{ needs.resolve.outputs.skip_existing == 'true' }}

      - name: Validate token bootstrap prerequisites
        if: ${{ (steps.auth.outputs.mode == 'token' || (steps.auth.outputs.mode != 'token' && needs.resolve.outputs.allow_token_bootstrap_on_missing == 'true' && steps.trusted_publish.outcome == 'failure' && steps.pypi_project.outputs.probe_status == 'missing')) && env.PYPI_API_TOKEN_PRESENT != 'true' }}
        env:
          PYPI_API_TOKEN_PRESENT: ${{ secrets.PYPI_API_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Token publish mode requires PYPI_API_TOKEN to be configured." >&2
          exit 1

      - name: Publish to PyPI (token bootstrap)
        id: token_publish
        if: ${{ (steps.auth.outputs.mode == 'token' || (steps.auth.outputs.mode != 'token' && needs.resolve.outputs.allow_token_bootstrap_on_missing == 'true' && steps.trusted_publish.outcome == 'failure' && steps.pypi_project.outputs.probe_status == 'missing')) && env.PYPI_API_TOKEN_PRESENT == 'true' }}
        env:
          PYPI_API_TOKEN_PRESENT: ${{ secrets.PYPI_API_TOKEN != '' }}
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: .github/tmp/${{ matrix.package_slug }}-dist
          skip-existing: ${{ needs.resolve.outputs.skip_existing == 'true' }}
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Fail on indeterminate PyPI probe
        if: ${{ steps.auth.outputs.mode != 'token' && steps.trusted_publish.outcome == 'failure' && steps.pypi_project.outputs.probe_status == 'error' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Trusted publish failed and PyPI probe result was indeterminate." >&2
          echo "Refusing token bootstrap for safety; retry later or force token mode explicitly." >&2
          exit 1

      - name: Validate publish mode resolution
        if: ${{ steps.auth.outputs.mode != 'token' && steps.trusted_publish.outcome == 'failure' && steps.token_publish.outcome != 'success' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Trusted publish failed and token bootstrap did not succeed." >&2
          echo "Set PYPI_API_TOKEN or configure trusted publishers for this repository/package." >&2
          exit 1

  publish_maturin:
    name: publish-pypi
    needs: resolve
    if: ${{ needs.resolve.outputs.enabled == 'true' && needs.resolve.outputs.mode == 'maturin' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout release commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Wait for CI to pass on the tagged commit
        if: ${{ github.event_name == 'push' && needs.resolve.outputs.wait_for_ci_command != '' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.sha }}
          TARGET_REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          CI_WAIT_STARTED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          export CI_WAIT_STARTED_AT
          eval "${{ needs.resolve.outputs.wait_for_ci_command }}"

      - name: Decide whether to publish PyPI distributions
        id: plan
        if: ${{ needs.resolve.outputs.plan_command != '' }}
        env:
          TARGET_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          eval "${{ needs.resolve.outputs.plan_command }}"

      - name: Resolve publish decision
        id: release
        shell: bash
        run: |
          set -euo pipefail

          publish="${{ steps.plan.outputs.publish || '' }}"
          if [[ -z "${publish}" ]]; then
            publish="true"
          fi

          if [[ "${{ needs.resolve.outputs.enabled }}" != "true" ]]; then
            publish="false"
          fi

          version="${{ steps.plan.outputs.version || '' }}"
          if [[ -z "${version}" ]]; then
            tag="${{ needs.resolve.outputs.release_tag }}"
            version="${tag#v}"
          fi

          echo "publish=${publish}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: ${{ steps.release.outputs.publish == 'true' && needs.resolve.outputs.setup_python == 'true' }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.1.0
        with:
          python-version: ${{ needs.resolve.outputs.python_version }}
          cache: pip
          cache-dependency-path: ${{ needs.resolve.outputs.cache_dependency_path }}

      - name: Set up Rust
        if: ${{ steps.release.outputs.publish == 'true' && needs.resolve.outputs.setup_rust == 'true' }}
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ needs.resolve.outputs.rust_toolchain }}

      - name: Restore the Rust cache
        if: ${{ steps.release.outputs.publish == 'true' && needs.resolve.outputs.setup_rust == 'true' }}
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Prepare release tree
        if: ${{ steps.release.outputs.publish == 'true' }}
        id: release_tree
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          release_tree="${GITHUB_WORKSPACE}/artifacts/release-tree"
          rm -rf "${release_tree}"

          if [[ -n "${{ needs.resolve.outputs.prepare_command }}" ]]; then
            eval "${{ needs.resolve.outputs.prepare_command }}"
          else
            python3 .github/scripts/prepare_release_tree.py \
              --workspace-root . \
              --output-dir "${release_tree}" \
              --version "${RELEASE_VERSION}" >/dev/null
          fi

          rm -rf artifacts/python/build
          mkdir -p artifacts/python/build
          echo "path=${release_tree}" >> "${GITHUB_OUTPUT}"

      - name: Build manylinux wheel
        if: ${{ steps.release.outputs.publish == 'true' }}
        uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1.50.1
        with:
          maturin-version: ${{ needs.resolve.outputs.maturin_version }}
          rust-toolchain: ${{ needs.resolve.outputs.rust_toolchain }}
          working-directory: ${{ steps.release_tree.outputs.path }}
          manylinux: "2014"
          command: build
          args: >-
            --release
            --locked
            --manifest-path ${{ needs.resolve.outputs.manifest_path }}
            --interpreter ${{ needs.resolve.outputs.python_interpreter }}
            --compatibility pypi
            --out ${{ github.workspace }}/artifacts/python/build

      - name: Build source distribution
        if: ${{ steps.release.outputs.publish == 'true' }}
        uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1.50.1
        with:
          maturin-version: ${{ needs.resolve.outputs.maturin_version }}
          rust-toolchain: ${{ needs.resolve.outputs.rust_toolchain }}
          working-directory: ${{ steps.release_tree.outputs.path }}
          command: sdist
          args: >-
            --manifest-path ${{ needs.resolve.outputs.manifest_path }}
            --out ${{ github.workspace }}/artifacts/python/build

      - name: Publish PyPI distributions
        if: ${{ steps.release.outputs.publish == 'true' }}
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          eval "${{ needs.resolve.outputs.publish_command }}"
