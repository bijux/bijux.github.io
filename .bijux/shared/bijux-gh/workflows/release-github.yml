# SSOT NOTICE: Synced consumer copies are generated from bijux-std/shared/bijux-gh/workflows/release-github.yml.
# Do not edit consumer workflow copies directly; update bijux-std and run standards sync refresh.

name: release-github

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to publish (defaults to current tag on tag pushes)"
        required: false
        type: string
      enabled:
        description: "Enable GitHub release publication for this run"
        required: false
        type: boolean
      build_matrix_json:
        description: "JSON array for shared release build matrix"
        required: false
        type: string
  workflow_call:
    inputs:
      release_tag:
        required: false
        type: string
        default: ""
      enabled:
        required: false
        type: boolean
        default: true
      build_matrix_json:
        required: false
        type: string
        default: ""
      artifact_pattern:
        required: false
        type: string
        default: ""
      artifact_path:
        required: false
        type: string
        default: ".github/tmp/release-assets"
      release_files_glob:
        required: false
        type: string
        default: ""
      release_files_manifest:
        required: false
        type: string
        default: ""
      release_notes_path:
        required: false
        type: string
        default: ""
      release_name:
        required: false
        type: string
        default: ""
      wait_for_ci_command:
        required: false
        type: string
        default: ""
      plan_command:
        required: false
        type: string
        default: ""
      prepare_command:
        required: false
        type: string
        default: ""
      setup_python:
        required: false
        type: boolean
        default: false
      python_version:
        required: false
        type: string
        default: "3.11"
      setup_rust:
        required: false
        type: boolean
        default: false
      rust_toolchain:
        required: false
        type: string
        default: "stable"
      delete_existing_release:
        required: false
        type: boolean
        default: false
      fail_on_unmatched_files:
        required: false
        type: boolean
        default: false
      generate_release_notes:
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  actions: read

concurrency:
  group: release-github-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    name: resolve-release-github-config
    runs-on: ubuntu-24.04
    outputs:
      release_tag: ${{ steps.config.outputs.release_tag }}
      enabled: ${{ steps.config.outputs.enabled }}
      release_name: ${{ steps.config.outputs.release_name }}
      build_matrix_json: ${{ steps.config.outputs.build_matrix_json }}
      artifact_pattern: ${{ steps.config.outputs.artifact_pattern }}
      artifact_path: ${{ steps.config.outputs.artifact_path }}
      release_files_glob: ${{ steps.config.outputs.release_files_glob }}
      release_notes_path: ${{ steps.config.outputs.release_notes_path }}
      wait_for_ci_command: ${{ steps.config.outputs.wait_for_ci_command }}
      plan_command: ${{ steps.config.outputs.plan_command }}
      prepare_command: ${{ steps.config.outputs.prepare_command }}
      setup_python: ${{ steps.config.outputs.setup_python }}
      python_version: ${{ steps.config.outputs.python_version }}
      setup_rust: ${{ steps.config.outputs.setup_rust }}
      rust_toolchain: ${{ steps.config.outputs.rust_toolchain }}
      delete_existing_release: ${{ steps.config.outputs.delete_existing_release }}
      fail_on_unmatched_files: ${{ steps.config.outputs.fail_on_unmatched_files }}
      generate_release_notes: ${{ steps.config.outputs.generate_release_notes }}
    steps:
      - name: Checkout release configuration
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 1

      - name: Resolve release configuration
        id: config
        shell: bash
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag || github.event.inputs.release_tag || '' }}
          INPUT_BUILD_MATRIX_JSON: ${{ inputs.build_matrix_json || github.event.inputs.build_matrix_json || '' }}
          INPUT_ARTIFACT_PATTERN: ${{ inputs.artifact_pattern || '' }}
          INPUT_ARTIFACT_PATH: ${{ inputs.artifact_path || '' }}
          INPUT_RELEASE_FILES_GLOB: ${{ inputs.release_files_glob || '' }}
          INPUT_RELEASE_FILES_MANIFEST: ${{ inputs.release_files_manifest || '' }}
          INPUT_RELEASE_NOTES_PATH: ${{ inputs.release_notes_path || '' }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name || '' }}
          INPUT_WAIT_FOR_CI_COMMAND: ${{ inputs.wait_for_ci_command || '' }}
          INPUT_PLAN_COMMAND: ${{ inputs.plan_command || '' }}
          INPUT_PREPARE_COMMAND: ${{ inputs.prepare_command || '' }}
          INPUT_PYTHON_VERSION: ${{ inputs.python_version || '' }}
          INPUT_RUST_TOOLCHAIN: ${{ inputs.rust_toolchain || '' }}
          INPUT_ENABLED_RAW: ${{ toJSON(inputs.enabled) }}
          INPUT_SETUP_PYTHON_RAW: ${{ toJSON(inputs.setup_python) }}
          INPUT_SETUP_RUST_RAW: ${{ toJSON(inputs.setup_rust) }}
          INPUT_DELETE_EXISTING_RELEASE_RAW: ${{ toJSON(inputs.delete_existing_release) }}
          INPUT_FAIL_ON_UNMATCHED_FILES_RAW: ${{ toJSON(inputs.fail_on_unmatched_files) }}
          INPUT_GENERATE_RELEASE_NOTES_RAW: ${{ toJSON(inputs.generate_release_notes) }}
          DISPATCH_ENABLED_RAW: ${{ github.event.inputs.enabled || '' }}
        run: |
          set -euo pipefail

          if [[ -f ".github/release.env" ]]; then
            # shellcheck disable=SC1091
            source ".github/release.env"
          fi

          non_empty() {
            local value="$1"
            [[ -n "${value// }" ]]
          }

          from_values() {
            local input_value="$1"
            local env_value="$2"
            local repo_var_value="$3"
            local default_value="$4"
            if non_empty "$input_value"; then
              printf '%s\n' "$input_value"
              return
            fi
            if non_empty "$env_value"; then
              printf '%s\n' "$env_value"
              return
            fi
            if non_empty "$repo_var_value"; then
              printf '%s\n' "$repo_var_value"
              return
            fi
            printf '%s\n' "$default_value"
          }

          bool_from_values() {
            local input_value="$1"
            local env_value="$2"
            local repo_var_value="$3"
            local default_value="$4"
            local raw
            raw="$(from_values "$input_value" "$env_value" "$repo_var_value" "$default_value")"
            case "${raw,,}" in
              true|1|yes|on) printf 'true\n' ;;
              false|0|no|off) printf 'false\n' ;;
              *) printf '%s\n' "$default_value" ;;
            esac
          }

          normalize_bool_optional() {
            local raw="$1"
            case "${raw,,}" in
              true|1|yes|on) printf 'true\n' ;;
              false|0|no|off) printf 'false\n' ;;
              ''|null) printf '\n' ;;
              *) printf '\n' ;;
            esac
          }

          validate_build_matrix() {
            local raw="$1"
            python3 - "$raw" <<'PY'
          import json
          import sys

          raw = sys.argv[1]
          try:
              value = json.loads(raw)
          except Exception as exc:  # pragma: no cover
              raise SystemExit(f"Invalid build matrix JSON: {exc}")
          if not isinstance(value, list):
              raise SystemExit("Build matrix JSON must be a JSON array")
          for index, item in enumerate(value):
              if not isinstance(item, dict):
                  raise SystemExit(f"Build matrix entry {index} must be an object")
              if "package_slug" not in item or not str(item["package_slug"]).strip():
                  raise SystemExit(f"Build matrix entry {index} missing package_slug")
          print(json.dumps(value, separators=(",", ":")))
          PY
          }

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            default_tag="${GITHUB_REF_NAME}"
          else
            default_tag=""
          fi

          input_enabled="$(normalize_bool_optional "${INPUT_ENABLED_RAW}")"
          if [[ -z "${input_enabled}" ]]; then
            input_enabled="$(normalize_bool_optional "${DISPATCH_ENABLED_RAW}")"
          fi

          input_setup_python="$(normalize_bool_optional "${INPUT_SETUP_PYTHON_RAW}")"
          input_setup_rust="$(normalize_bool_optional "${INPUT_SETUP_RUST_RAW}")"
          input_delete_existing_release="$(normalize_bool_optional "${INPUT_DELETE_EXISTING_RELEASE_RAW}")"
          input_fail_on_unmatched_files="$(normalize_bool_optional "${INPUT_FAIL_ON_UNMATCHED_FILES_RAW}")"
          input_generate_release_notes="$(normalize_bool_optional "${INPUT_GENERATE_RELEASE_NOTES_RAW}")"

          release_tag="$(from_values "${INPUT_RELEASE_TAG}" "${BIJUX_RELEASE_TAG:-}" "${{ vars.BIJUX_RELEASE_TAG || '' }}" "$default_tag")"
          enabled="$(bool_from_values "${input_enabled}" "${BIJUX_RELEASE_ENABLED:-}" "${{ vars.BIJUX_RELEASE_ENABLED || '' }}" "true")"
          release_name="$(from_values "${INPUT_RELEASE_NAME}" "${BIJUX_RELEASE_NAME:-}" "${{ vars.BIJUX_RELEASE_NAME || '' }}" "")"
          build_matrix_json="$(from_values "${INPUT_BUILD_MATRIX_JSON}" "${BIJUX_RELEASE_BUILD_MATRIX_JSON:-}" "${{ vars.BIJUX_RELEASE_BUILD_MATRIX_JSON || '' }}" "[]")"
          artifact_pattern="$(from_values "${INPUT_ARTIFACT_PATTERN}" "${BIJUX_RELEASE_ARTIFACT_PATTERN:-}" "${{ vars.BIJUX_RELEASE_ARTIFACT_PATTERN || '' }}" "")"
          artifact_path="$(from_values "${INPUT_ARTIFACT_PATH}" "${BIJUX_RELEASE_ARTIFACT_PATH:-}" "${{ vars.BIJUX_RELEASE_ARTIFACT_PATH || '' }}" ".github/tmp/release-assets")"
          release_files_glob="$(from_values "${INPUT_RELEASE_FILES_GLOB}" "${BIJUX_RELEASE_FILES_GLOB:-}" "${{ vars.BIJUX_RELEASE_FILES_GLOB || '' }}" "")"
          release_files_manifest="$(from_values "${INPUT_RELEASE_FILES_MANIFEST}" "${BIJUX_RELEASE_FILES_MANIFEST:-}" "${{ vars.BIJUX_RELEASE_FILES_MANIFEST || '' }}" "")"
          release_notes_path="$(from_values "${INPUT_RELEASE_NOTES_PATH}" "${BIJUX_RELEASE_NOTES_PATH:-}" "${{ vars.BIJUX_RELEASE_NOTES_PATH || '' }}" "")"
          wait_for_ci_command="$(from_values "${INPUT_WAIT_FOR_CI_COMMAND}" "${BIJUX_RELEASE_WAIT_FOR_CI_COMMAND:-}" "${{ vars.BIJUX_RELEASE_WAIT_FOR_CI_COMMAND || '' }}" "")"
          plan_command="$(from_values "${INPUT_PLAN_COMMAND}" "${BIJUX_RELEASE_PLAN_COMMAND:-}" "${{ vars.BIJUX_RELEASE_PLAN_COMMAND || '' }}" "")"
          prepare_command="$(from_values "${INPUT_PREPARE_COMMAND}" "${BIJUX_RELEASE_PREPARE_COMMAND:-}" "${{ vars.BIJUX_RELEASE_PREPARE_COMMAND || '' }}" "")"
          setup_python="$(bool_from_values "${input_setup_python}" "${BIJUX_RELEASE_SETUP_PYTHON:-}" "${{ vars.BIJUX_RELEASE_SETUP_PYTHON || '' }}" "false")"
          python_version="$(from_values "${INPUT_PYTHON_VERSION}" "${BIJUX_RELEASE_PYTHON_VERSION:-}" "${{ vars.BIJUX_RELEASE_PYTHON_VERSION || '' }}" "3.11")"
          setup_rust="$(bool_from_values "${input_setup_rust}" "${BIJUX_RELEASE_SETUP_RUST:-}" "${{ vars.BIJUX_RELEASE_SETUP_RUST || '' }}" "false")"
          rust_toolchain="$(from_values "${INPUT_RUST_TOOLCHAIN}" "${BIJUX_RELEASE_RUST_TOOLCHAIN:-}" "${{ vars.BIJUX_RELEASE_RUST_TOOLCHAIN || '' }}" "stable")"
          delete_existing_release="$(bool_from_values "${input_delete_existing_release}" "${BIJUX_RELEASE_DELETE_EXISTING:-}" "${{ vars.BIJUX_RELEASE_DELETE_EXISTING || '' }}" "false")"
          fail_on_unmatched_files="$(bool_from_values "${input_fail_on_unmatched_files}" "${BIJUX_RELEASE_FAIL_ON_UNMATCHED_FILES:-}" "${{ vars.BIJUX_RELEASE_FAIL_ON_UNMATCHED_FILES || '' }}" "false")"
          generate_release_notes="$(bool_from_values "${input_generate_release_notes}" "${BIJUX_RELEASE_GENERATE_RELEASE_NOTES:-}" "${{ vars.BIJUX_RELEASE_GENERATE_RELEASE_NOTES || '' }}" "true")"

          if [[ "${enabled}" == "true" && -n "${release_tag}" && "${release_tag}" != v* ]]; then
            echo "release_tag must start with 'v' when release-github is enabled: ${release_tag}" >&2
            exit 1
          fi

          build_matrix_json="$(validate_build_matrix "${build_matrix_json}")"
          if [[ "${enabled}" == "true" && "${build_matrix_json}" == "[]" ]]; then
            enabled="false"
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${enabled}" != "true" ]]; then
            echo "Manual dispatch resolved to a no-op release-github run." >&2
            echo "Set enabled=true and ensure release matrices resolve to at least one package." >&2
            exit 1
          fi

          if [[ -n "${release_files_manifest}" ]]; then
            if [[ ! -f "${release_files_manifest}" ]]; then
              echo "release files manifest not found: ${release_files_manifest}" >&2
              exit 1
            fi
            release_files_glob="$(cat "${release_files_manifest}")"
          fi

          if [[ -z "${artifact_pattern}" && "${build_matrix_json}" != "[]" ]]; then
            artifact_pattern='*-release'
          fi

          if [[ -z "${release_files_glob}" && -n "${artifact_pattern}" ]]; then
            release_files_glob="${artifact_path}/**/*"
          fi

          {
            echo "release_tag=${release_tag}"
            echo "enabled=${enabled}"
            echo "release_name=${release_name}"
            echo "artifact_pattern=${artifact_pattern}"
            echo "artifact_path=${artifact_path}"
            echo "release_notes_path=${release_notes_path}"
            echo "wait_for_ci_command=${wait_for_ci_command}"
            echo "plan_command=${plan_command}"
            echo "prepare_command=${prepare_command}"
            echo "setup_python=${setup_python}"
            echo "python_version=${python_version}"
            echo "setup_rust=${setup_rust}"
            echo "rust_toolchain=${rust_toolchain}"
            echo "delete_existing_release=${delete_existing_release}"
            echo "fail_on_unmatched_files=${fail_on_unmatched_files}"
            echo "generate_release_notes=${generate_release_notes}"
            echo "build_matrix_json<<EOF"
            printf '%s\n' "${build_matrix_json}"
            echo "EOF"
            echo "release_files_glob<<EOF"
            printf '%s\n' "${release_files_glob}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    name: build-${{ matrix.package_slug }}
    needs: resolve
    if: ${{ needs.resolve.outputs.enabled == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.resolve.outputs.build_matrix_json) }}
    uses: ./.github/workflows/release-artifacts.yml
    with:
      package_slug: ${{ matrix.package_slug }}
      package_dir: ${{ matrix.package_dir }}
      artifacts_dir: ${{ matrix.artifacts_dir }}
      makefile_path: ${{ matrix.makefile_path || '' }}
      build_targets: ${{ matrix.build_targets || 'build' }}
      dist_subdir: ${{ matrix.dist_subdir || 'build' }}

  release:
    name: github-release
    needs:
      - resolve
      - build
    if: ${{ needs.resolve.outputs.enabled == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Setup Python
        if: ${{ needs.resolve.outputs.setup_python == 'true' }}
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: ${{ needs.resolve.outputs.python_version }}

      - name: Install Rust toolchain
        if: ${{ needs.resolve.outputs.setup_rust == 'true' }}
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ needs.resolve.outputs.rust_toolchain }}

      - name: Restore Rust cache
        if: ${{ needs.resolve.outputs.setup_rust == 'true' }}
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Wait for CI gate
        if: ${{ github.event_name == 'push' && needs.resolve.outputs.wait_for_ci_command != '' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.sha }}
          TARGET_REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          CI_WAIT_STARTED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          export CI_WAIT_STARTED_AT
          eval "${{ needs.resolve.outputs.wait_for_ci_command }}"

      - name: Decide whether to publish a GitHub Release
        id: plan
        if: ${{ needs.resolve.outputs.plan_command != '' }}
        env:
          TARGET_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          eval "${{ needs.resolve.outputs.plan_command }}"

      - name: Resolve publish decision
        id: release
        shell: bash
        run: |
          set -euo pipefail

          publish="${{ steps.plan.outputs.publish || '' }}"
          if [[ -z "${publish}" ]]; then
            publish="true"
          fi
          if [[ "${{ needs.resolve.outputs.enabled }}" != "true" ]]; then
            publish="false"
          fi

          release_tag="${{ steps.plan.outputs.tag || '' }}"
          if [[ -z "${release_tag}" ]]; then
            release_tag="${{ needs.resolve.outputs.release_tag }}"
          fi

          release_name="${{ needs.resolve.outputs.release_name }}"
          if [[ -z "${release_name}" ]]; then
            release_name="${release_tag}"
          fi

          release_version="${{ steps.plan.outputs.version || '' }}"

          if [[ "${publish}" == "true" && -z "${release_tag}" ]]; then
            echo "release tag is required when publish=true" >&2
            exit 1
          fi

          {
            echo "publish=${publish}"
            echo "release_tag=${release_tag}"
            echo "release_name=${release_name}"
            echo "release_version=${release_version}"
            echo "release_notes_path=${{ needs.resolve.outputs.release_notes_path }}"
            echo "release_files_glob<<EOF"
            printf '%s\n' "${{ needs.resolve.outputs.release_files_glob }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare release assets
        if: ${{ steps.release.outputs.publish == 'true' && needs.resolve.outputs.prepare_command != '' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
          RELEASE_NAME: ${{ steps.release.outputs.release_name }}
          RELEASE_VERSION: ${{ steps.release.outputs.release_version }}
        shell: bash
        run: |
          set -euo pipefail
          eval "${{ needs.resolve.outputs.prepare_command }}"

      - name: Download staged release artifacts
        if: ${{ steps.release.outputs.publish == 'true' && needs.resolve.outputs.artifact_pattern != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh run download "${GITHUB_RUN_ID}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "${{ needs.resolve.outputs.artifact_pattern }}" \
            --dir "${{ needs.resolve.outputs.artifact_path }}"

      - name: Reset existing GitHub release
        if: ${{ steps.release.outputs.publish == 'true' && needs.resolve.outputs.delete_existing_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${{ steps.release.outputs.release_tag }}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release delete "${{ steps.release.outputs.release_tag }}" \
              --repo "${GITHUB_REPOSITORY}" \
              --yes
          else
            echo "No existing GitHub release for ${{ steps.release.outputs.release_tag }}; creating a fresh release."
          fi

      - name: Publish GitHub release with files and body
        if: ${{ steps.release.outputs.publish == 'true' && steps.release.outputs.release_files_glob != '' && steps.release.outputs.release_notes_path != '' }}
        uses: softprops/action-gh-release@6cbd405e2c4e67a21c47fa9e383d020e4e28b836 # v2.3.3
        with:
          tag_name: ${{ steps.release.outputs.release_tag }}
          name: ${{ steps.release.outputs.release_name }}
          body_path: ${{ steps.release.outputs.release_notes_path }}
          files: ${{ steps.release.outputs.release_files_glob }}
          overwrite_files: true
          fail_on_unmatched_files: ${{ needs.resolve.outputs.fail_on_unmatched_files == 'true' }}
          generate_release_notes: ${{ needs.resolve.outputs.generate_release_notes == 'true' }}
          preserve_order: true

      - name: Publish GitHub release with files
        if: ${{ steps.release.outputs.publish == 'true' && steps.release.outputs.release_files_glob != '' && steps.release.outputs.release_notes_path == '' }}
        uses: softprops/action-gh-release@6cbd405e2c4e67a21c47fa9e383d020e4e28b836 # v2.3.3
        with:
          tag_name: ${{ steps.release.outputs.release_tag }}
          name: ${{ steps.release.outputs.release_name }}
          files: ${{ steps.release.outputs.release_files_glob }}
          overwrite_files: true
          fail_on_unmatched_files: ${{ needs.resolve.outputs.fail_on_unmatched_files == 'true' }}
          generate_release_notes: ${{ needs.resolve.outputs.generate_release_notes == 'true' }}
          preserve_order: true

      - name: Publish GitHub release with body
        if: ${{ steps.release.outputs.publish == 'true' && steps.release.outputs.release_files_glob == '' && steps.release.outputs.release_notes_path != '' }}
        uses: softprops/action-gh-release@6cbd405e2c4e67a21c47fa9e383d020e4e28b836 # v2.3.3
        with:
          tag_name: ${{ steps.release.outputs.release_tag }}
          name: ${{ steps.release.outputs.release_name }}
          body_path: ${{ steps.release.outputs.release_notes_path }}
          generate_release_notes: ${{ needs.resolve.outputs.generate_release_notes == 'true' }}

      - name: Publish GitHub release without assets
        if: ${{ steps.release.outputs.publish == 'true' && steps.release.outputs.release_files_glob == '' && steps.release.outputs.release_notes_path == '' }}
        uses: softprops/action-gh-release@6cbd405e2c4e67a21c47fa9e383d020e4e28b836 # v2.3.3
        with:
          tag_name: ${{ steps.release.outputs.release_tag }}
          name: ${{ steps.release.outputs.release_name }}
          generate_release_notes: ${{ needs.resolve.outputs.generate_release_notes == 'true' }}
