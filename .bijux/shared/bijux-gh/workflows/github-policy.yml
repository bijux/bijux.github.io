# SSOT NOTICE: Synced consumer copies are generated from bijux-std/shared/bijux-gh/workflows/github-policy.yml.
# Do not edit consumer workflow copies directly; update bijux-std and run standards sync refresh.

name: policy / github

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

permissions:
  contents: read

jobs:
  policy:
    name: policy / github
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.0
        with:
          fetch-depth: 0

      - name: Gather changed files
        shell: bash
        run: |
          set -euo pipefail
          write_single_commit_diff() {
            git diff-tree --no-commit-id --name-only -r "${GITHUB_SHA}" > /tmp/changed-files.txt
          }
          write_range_diff_or_fallback() {
            local base_sha="$1"
            local head_sha="$2"
            if [[ -z "${base_sha}" || -z "${head_sha}" ]]; then
              write_single_commit_diff
              return 0
            fi
            if ! git cat-file -e "${base_sha}^{commit}" 2>/dev/null; then
              write_single_commit_diff
              return 0
            fi
            if ! git cat-file -e "${head_sha}^{commit}" 2>/dev/null; then
              write_single_commit_diff
              return 0
            fi
            if git merge-base --is-ancestor "${base_sha}" "${head_sha}" 2>/dev/null; then
              git diff --name-only "${base_sha}...${head_sha}" > /tmp/changed-files.txt
            else
              write_single_commit_diff
            fi
          }
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_ref="${{ github.base_ref }}"
            git fetch --no-tags --prune --depth=1 origin "${base_ref}"
            git diff --name-only "origin/${base_ref}...HEAD" > /tmp/changed-files.txt
          elif [[ "${{ github.event_name }}" == "merge_group" ]]; then
            base_sha="${{ github.event.merge_group.base_sha }}"
            head_sha="${{ github.event.merge_group.head_sha }}"
            if [[ -n "${base_sha}" && "${base_sha}" != "null" && -n "${head_sha}" && "${head_sha}" != "null" ]]; then
              write_range_diff_or_fallback "${base_sha}" "${head_sha}"
            else
              write_single_commit_diff
            fi
          else
            before_sha="${{ github.event.before }}"
            if [[ -n "${before_sha}" && "${before_sha}" != "0000000000000000000000000000000000000000" ]]; then
              write_range_diff_or_fallback "${before_sha}" "${GITHUB_SHA}"
            else
              write_single_commit_diff
            fi
          fi

      - name: Enforce protected .github change policy
        if: ${{ github.event_name == 'pull_request' }}
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/check_protected_github_changes.py --changed-file-list /tmp/changed-files.txt

      - name: Render generated .github files from manifest
        shell: bash
        run: |
          set -euo pipefail
          repo_name="${GITHUB_REPOSITORY#*/}"
          python3 .github/scripts/render_repo_configs.py --repo "${repo_name}"

      - name: Ensure generated files are committed
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$(git status --short -- .github/release.env .github/dependabot.yml .github/labeler.yml .github/codecov.yml .github/workflows/ci.yml .github/workflows/verify.yml .github/standards/bijux-std.sha)" ]]; then
            git status --short -- .github/release.env .github/dependabot.yml .github/labeler.yml .github/codecov.yml .github/workflows/ci.yml .github/workflows/verify.yml .github/standards/bijux-std.sha
            exit 1
          fi

      - name: Verify shared file checksums
        shell: bash
        run: |
          set -euo pipefail
          sha256sum --check .github/bijux-std-shared.sha256

      - name: Verify pinned action references
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/check_pinned_actions.py \
            --manifest-managed .github/standards/repo-config.manifest.json \
            .github/workflows
