# SSOT NOTICE: Synced consumer copies are generated from bijux-std/shared/bijux-gh/workflows/labeler.yml.
# Do not edit consumer workflow copies directly; update bijux-std and run standards sync refresh.

name: labeler

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: labeler
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true
